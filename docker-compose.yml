services:
  # ── Spring Boot Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/complaints"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── React Frontend (Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cms-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
