# Application Configuration
spring.application.name=Smart Complaint Management System
# Render typically provides a PORT env var, defaulting to 10000 or 8080
server.port=${PORT:8080}

# Database Configuration
# This setup is flexible: it can take a full JDBC URL or construct one from parts
# If DB_URL is provided, it must start with jdbc:postgresql://
# If not, it constructs one using DB_HOST, DB_PORT, and DB_NAME
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:complaintdb}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 Console (Disabled in production for security and to avoid startup noise)
spring.h2.console.enabled=false

# Initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
