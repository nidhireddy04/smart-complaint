# Application Configuration
spring.application.name=Smart Complaint Management System
server.port=${PORT:8080}

# Database Configuration
# Defaults to H2 for local dev; override with env vars for production (PostgreSQL on Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# H2 Console (only works with H2, harmless when using PostgreSQL)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Initialize data
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
